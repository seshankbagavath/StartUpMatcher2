kind = "web"
previewPath = "/"
title = "Startup Hub"
version = "1.0.0"
id = "artifacts/startup-hub"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 21154

[services.development]
run = "pnpm --filter @workspace/startup-hub run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/startup-hub", "run", "build" ]
publicDir = "artifacts/startup-hub/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "21154"
BASE_PATH = "/"
